{% extends "base.html" %}
{% block title %}Import Complete — Finance Tracker{% endblock %}
{% block page_title %}Import Complete{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto text-center">
    <div class="bg-white rounded-2xl shadow-sm ring-1 ring-gray-100 p-10">
        <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-emerald-100 mb-5">
            <svg class="h-8 w-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
        </div>
        <h2 class="text-base font-bold text-gray-900 mb-2">Import Successful</h2>
        <p class="text-gray-500 mb-8">{{ count }} transaction{{ 's' if count != 1 }} imported.</p>
        <div class="flex justify-center gap-3">
            <a href="/transactions" class="px-5 py-2.5 text-sm font-semibold text-white bg-brand-600 rounded-xl hover:bg-brand-700 transition-colors shadow-sm">View Transactions</a>
            <a href="/imports" class="px-5 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-xl hover:bg-gray-50 transition-colors">Import More</a>
        </div>
    </div>
</div>
{% endblock %}
