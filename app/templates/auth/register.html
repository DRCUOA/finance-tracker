{% extends "base.html" %}

{% block fullpage %}
<div class="min-h-full flex items-center justify-center py-16 px-4 bg-gradient-to-br from-brand-50 via-gray-50 to-brand-50">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-brand-950 tracking-tight">Finance Tracker</h1>
            <p class="mt-3 text-sm text-gray-500">Create your account</p>
        </div>
        <form method="post" action="/register" class="bg-white p-8 rounded-2xl shadow-lg ring-1 ring-gray-100 space-y-5">
            {% if error %}
            <div class="bg-red-50 text-red-700 px-4 py-3 rounded-xl text-sm font-medium">{{ error }}</div>
            {% endif %}
            <div>
                <label for="display_name" class="block text-sm font-medium text-gray-700 mb-1.5">Display name</label>
                <input type="text" name="display_name" id="display_name" required
                       class="block w-full rounded-xl border border-gray-300 px-4 py-2.5 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500 transition-colors">
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
                <input type="email" name="email" id="email" required
                       class="block w-full rounded-xl border border-gray-300 px-4 py-2.5 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500 transition-colors">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                <input type="password" name="password" id="password" required minlength="8"
                       class="block w-full rounded-xl border border-gray-300 px-4 py-2.5 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500 transition-colors">
            </div>
            <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors">
                Create account
            </button>
            <p class="text-center text-sm text-gray-500 pt-2">
                Already have an account? <a href="/login" class="text-brand-600 hover:text-brand-500 font-semibold">Sign in</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
