{% extends "base.html" %}

{% block fullpage %}
<div class="min-h-full flex items-center justify-center py-16 px-4 bg-gradient-to-br from-gray-100 via-gray-50 to-gray-100 dark:from-brand-950 dark:via-gray-900 dark:to-brand-950">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <div class="flex justify-center mb-4">
                <svg class="w-12 h-12 text-brand-600 dark:text-brand-200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 20c-3 1-4-1-2-3C9 12 14 6 17 3"/>
                    <path d="M13 3h4v4"/>
                    <path d="M7 5c1.5 1.5 2.5 3.5 3.5 5.5"/>
                    <path d="M14 14c1.5 2 2.5 3.5 3 5"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-brand-950 dark:text-brand-100 tracking-tight">Finla</h1>
            <p class="mt-3 text-sm text-gray-500 dark:text-gray-400">Create your account</p>
        </div>
        <form method="post" action="/register" class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-lg ring-1 ring-gray-100 dark:ring-gray-700 space-y-5">
            {% if error %}
            <div class="bg-negative-50 dark:bg-negative-900/30 text-negative-700 dark:text-negative-400 px-4 py-3 rounded-xl text-sm font-medium">{{ error }}</div>
            {% endif %}
            <div>
                <label for="display_name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Display name</label>
                <input type="text" name="display_name" id="display_name" required
                       class="block w-full rounded-xl border border-gray-300 px-4 py-2.5 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500 transition-colors">
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Email</label>
                <input type="email" name="email" id="email" required
                       class="block w-full rounded-xl border border-gray-300 px-4 py-2.5 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500 transition-colors">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Password</label>
                <input type="password" name="password" id="password" required minlength="8"
                       class="block w-full rounded-xl border border-gray-300 px-4 py-2.5 text-sm shadow-sm focus:border-brand-500 focus:ring-brand-500 transition-colors">
            </div>
            <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 dark:focus:ring-offset-gray-800 focus:ring-brand-500 transition-colors">
                Create account
            </button>
            <p class="text-center text-sm text-gray-500 dark:text-gray-400 pt-2">
                Already have an account? <a href="/login" class="text-brand-600 hover:text-brand-500 dark:text-brand-400 dark:hover:text-brand-300 font-semibold">Sign in</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
