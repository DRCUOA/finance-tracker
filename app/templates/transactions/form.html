{% extends "base.html" %}
{% block title %}{{ "Edit" if tx else "New" }} Transaction — Finance Tracker{% endblock %}
{% block page_title %}{{ "Edit" if tx else "New" }} Transaction{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <form method="post" action="/transactions/{{ tx.id ~ '/edit' if tx else 'create' }}" class="bg-white rounded-2xl shadow-sm ring-1 ring-gray-100 p-8 space-y-6">
        <div class="grid grid-cols-2 gap-5">
            <div>
                <label for="account_id" class="block text-sm font-medium text-gray-700 mb-1.5">Account</label>
                <select name="account_id" id="account_id" required class="block w-full rounded-xl border border-gray-300 px-4 py-2.5 text-sm focus:border-brand-500 focus:ring-brand-500 transition-colors">
                    {% for a in accounts %}
                    <option value="{{ a.id }}" {% if tx and tx.account_id == a.id %}selected{% endif %}>{{ a.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="tx_date" class="block text-sm font-medium text-gray-700 mb-1.5">Date</label>
                <input type="date" name="tx_date" id="tx_date" required value="{{ tx.date.isoformat() if tx else '' }}"
                       class="block w-full rounded-xl border border-gray-300 px-4 py-2.5 text-sm focus:border-brand-500 focus:ring-brand-500 transition-colors">
            </div>
        </div>
        <div class="grid grid-cols-2 gap-5">
            <div>
                <label for="amount" class="block text-sm font-medium text-gray-700 mb-1.5">Amount <span class="text-gray-400 font-normal">(+ income, - expense)</span></label>
                <input type="number" step="0.01" name="amount" id="amount" required value="{{ tx.amount if tx else '' }}"
                       class="block w-full rounded-xl border border-gray-300 px-4 py-2.5 text-sm focus:border-brand-500 focus:ring-brand-500 transition-colors">
            </div>
            <div>
                <label for="category_id" class="block text-sm font-medium text-gray-700 mb-1.5">Category</label>
                <select name="category_id" id="category_id" class="block w-full rounded-xl border border-gray-300 px-4 py-2.5 text-sm focus:border-brand-500 focus:ring-brand-500 transition-colors">
                    <option value="">Uncategorised</option>
                    {% for c in categories %}
                    <option value="{{ c.id }}" {% if tx and tx.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
            <input type="text" name="description" id="description" required value="{{ tx.description if tx else '' }}"
                   class="block w-full rounded-xl border border-gray-300 px-4 py-2.5 text-sm focus:border-brand-500 focus:ring-brand-500 transition-colors">
        </div>
        <div class="grid grid-cols-2 gap-5">
            <div>
                <label for="reference" class="block text-sm font-medium text-gray-700 mb-1.5">Reference</label>
                <input type="text" name="reference" id="reference" value="{{ tx.reference if tx and tx.reference else '' }}"
                       class="block w-full rounded-xl border border-gray-300 px-4 py-2.5 text-sm focus:border-brand-500 focus:ring-brand-500 transition-colors">
            </div>
            <div>
                <label for="notes" class="block text-sm font-medium text-gray-700 mb-1.5">Notes</label>
                <input type="text" name="notes" id="notes" value="{{ tx.notes if tx and tx.notes else '' }}"
                       class="block w-full rounded-xl border border-gray-300 px-4 py-2.5 text-sm focus:border-brand-500 focus:ring-brand-500 transition-colors">
            </div>
        </div>
        <div class="flex items-center justify-between pt-6 border-t border-gray-100">
            <div>
                {% if tx %}
                <form method="post" action="/transactions/{{ tx.id }}/delete" class="inline" onsubmit="return confirm('Delete this transaction?')">
                    <button type="submit" class="text-red-600 hover:text-red-800 text-sm font-medium transition-colors">Delete</button>
                </form>
                {% endif %}
            </div>
            <div class="flex gap-3">
                <a href="/transactions" class="px-5 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-xl hover:bg-gray-50 transition-colors">Cancel</a>
                <button type="submit" class="px-5 py-2.5 text-sm font-semibold text-white bg-brand-600 rounded-xl hover:bg-brand-700 transition-colors shadow-sm">
                    {{ "Save Changes" if tx else "Create Transaction" }}
                </button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
